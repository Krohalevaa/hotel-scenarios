<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Scenario Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f7f9;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 22px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #34495e;
    }

    input[type="text"],
    input[type="email"],
    input[type="url"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd1d9;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #3498db;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #2980b9;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      font-size: 14px;
      text-align: center;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>TikTok Script Generator</h1>

    <div id="statusMessage" class="message"></div>

    <form id="hotelForm">
      <div class="form-group">
        <label for="hotel_website_url">Hotel Website URL:</label>
        <input type="url" id="hotel_website_url" name="hotel_website_url" placeholder="https://example.com" required>
      </div>

      <div class="form-group">
        <label for="business_goal">Main Business Goal:</label>
        <input type="text" id="business_goal" name="business_goal" placeholder="Increase weekend sales" required>
      </div>

      <div class="form-group">
        <label for="city">City:</label>
        <input type="text" id="city" name="city" placeholder="Paris" required>
      </div>

      <div class="form-group">
        <label for="contact_email">Email for Results:</label>
        <input type="email" id="contact_email" name="contact_email" placeholder="client@example.com" required>
      </div>

      <div class="form-group">
        <label for="language">Script Language:</label>
        <select id="language" name="language">
          <option value="English">English</option>
          <option value="Russian">Russian</option>
          <option value="Spanish">Spanish</option>
        </select>
      </div>

      <button type="submit">Generate Script</button>
    </form>
  </div>

  <script>
    document.getElementById('hotelForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      document.querySelector('button').disabled = true;
      document.querySelector('button').textContent = 'Submitting...';

      const statusMsg = document.getElementById('statusMessage');
      statusMsg.className = 'message';
      statusMsg.style.display = 'none';

      const data = {
        hotel_website_url: document.getElementById('hotel_website_url').value,
        business_goal: document.getElementById('business_goal').value,
        city: document.getElementById('city').value,
        contact_email: document.getElementById('contact_email').value,
        language: document.getElementById('language').value
      };

      try {
        const response = await fetch('/generate-script', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          statusMsg.innerHTML = '✅ Success! ' + result.message;
          statusMsg.className = 'message success';
          document.getElementById('hotelForm').reset();
        } else {
          throw new Error(result.error || 'An error occurred during submission');
        }
      } catch (error) {
        statusMsg.innerHTML = '❌ Error: ' + error.message;
        statusMsg.className = 'message error';
      } finally {
        document.querySelector('button').disabled = false;
        document.querySelector('button').textContent = 'Generate Script';
        statusMsg.style.display = 'block';
      }
    });
  </script>

</body>

</html>
