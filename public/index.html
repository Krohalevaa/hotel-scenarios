<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Scenario Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 25px;
      font-size: 24px;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 2px solid #eee;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
      color: #7f8c8d;
      transition: all 0.3s;
    }

    .tab.active {
      color: #3498db;
      border-bottom: 2px solid #3498db;
      margin-bottom: -2px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 13px;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    textarea {
      height: 250px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:disabled {
      background-color: #95a5a6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }

    .message.error {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      display: block;
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Scenario Generator</h1>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('single')">Single Hotel</div>
      <div class="tab" onclick="switchTab('bulk')">Bulk Upload (JSON)</div>
    </div>

    <div id="statusMessage" class="message"></div>

    <!-- Single Hotel Form -->
    <div id="single-form" class="form-content active">
      <form id="hotelForm">
        <div class="form-group">
          <label for="hotel_website_url">Hotel Website URL</label>
          <input type="url" id="hotel_website_url" name="hotel_website_url" placeholder="https://example.com" required>
        </div>

        <div class="form-group">
          <label for="business_goal">Main Business Goal</label>
          <input type="text" id="business_goal" name="business_goal" placeholder="Increase weekend sales" required>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Paris" required>
        </div>

        <div class="form-group">
          <label for="contact_email">Email for Results</label>
          <input type="email" id="contact_email" name="contact_email" placeholder="client@example.com" required>
        </div>

        <div class="form-group">
          <label for="language">Script Language</label>
          <select id="language" name="language">
            <option value="English">English</option>
            <option value="Russian">Russian</option>
            <option value="Spanish">Spanish</option>
          </select>
        </div>

        <button type="submit" id="btn-single">Generate Script</button>
      </form>
    </div>

    <!-- Bulk Upload Form -->
    <div id="bulk-form" class="form-content">
      <div class="form-group">
        <label for="bulk_json">Paste JSON Array</label>
        <textarea id="bulk_json" placeholder='[{"hotel_website_url": "...", "city": "...", ...}]'></textarea>
      </div>
      <button onclick="submitBulk()" id="btn-bulk">Mass Generate</button>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));

      if (tab === 'single') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('single-form').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('bulk-form').classList.add('active');
      }
    }

    async function submitBulk() {
      const btn = document.getElementById('btn-bulk');
      const jsonStr = document.getElementById('bulk_json').value;
      const statusMsg = document.getElementById('statusMessage');

      try {
        const data = JSON.parse(jsonStr);
        if (!Array.isArray(data)) throw new Error("Input must be a JSON array.");

        btn.disabled = true;
        btn.textContent = 'Processing...';
        statusMsg.style.display = 'none';

        const response = await fetch('/api/bulk-generate-script', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (response.ok) {
          statusMsg.innerHTML = '✅ ' + result.message;
          statusMsg.className = 'message success';
          document.getElementById('bulk_json').value = '';
        } else {
          throw new Error(result.message || 'Server error');
        }
      } catch (err) {
        statusMsg.innerHTML = '❌ Error: ' + err.message;
        statusMsg.className = 'message error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Mass Generate';
        statusMsg.style.display = 'block';
      }
    }

    document.getElementById('hotelForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btn-single');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const statusMsg = document.getElementById('statusMessage');
      statusMsg.style.display = 'none';

      const data = {
        hotel_website_url: document.getElementById('hotel_website_url').value,
        business_goal: document.getElementById('business_goal').value,
        city: document.getElementById('city').value,
        contact_email: document.getElementById('contact_email').value,
        language: document.getElementById('language').value
      };

      try {
        const response = await fetch('/generate-script', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (response.ok) {
          statusMsg.innerHTML = '✅ ' + result.message;
          statusMsg.className = 'message success';
          document.getElementById('hotelForm').reset();
        } else {
          throw new Error(result.error || 'An error occurred');
        }
      } catch (error) {
        statusMsg.innerHTML = '❌ Error: ' + error.message;
        statusMsg.className = 'message error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Script';
        statusMsg.style.display = 'block';
      }
    });
  </script>

</body>

</html>
